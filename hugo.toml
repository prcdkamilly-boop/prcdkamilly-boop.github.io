baseURL = 'https://prcdkamilly-boop.github.io/'
languageCode = 'zh-tw'
title = '駭客脈動中心'
theme = 'PaperMod'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
    # 啟用自定義 CSS
    customCSS = ["css/custom.css"]
    
    # 網站圖示 (Favicon )
    [params.assets]
        favicon = "images/hacker_logo.png"
        disableFingerprinting = true

    # 首頁大頭貼與歡迎詞 (修正了這裡的等號)
    [params.homeInfoParams]
        Title = "歡迎來到駭客脈動中心 💻"
        Content = "專注於網路安全、滲透測試與數位脈動的技術分享。在這裡，我們探索代碼背後的真相。"

    # 顯示閱讀時間與目錄
    ShowReadingTime = true
    ShowToc = true
    
    # 預設開啟深色模式
    defaultTheme = "dark"
    disableThemeToggle = true

    # 社交連結 - Telegram
    [[params.socialIcons]]
        name = "telegram"
        url = "https://t.me/HackPulse_Central"

